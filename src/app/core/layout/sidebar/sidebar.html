<button
  aria-controls="sidebar"
  class="z-11 cursor-pointer fixed top-3 left-3 items-center p-2 mt-2 ms-3 text-sm rounded-lg sm:hidden hover:bg-primary-100 focus:outline-none focus:ring-2 focus:ring-primary-200 text-white"
  data-drawer-target="sidebar"
  data-drawer-toggle="sidebar"
  type="button"
  (click)="toggle()"
>
  <span class="material-symbols-outlined">{{ isOpen() ? "close" : "menu"}}</span>
</button>

<aside aria-label="Sidebar"
       class="bg-background-200 open-close-container hidden fixed z-10 top-0 left-0 sm:w-44 w-full h-screen sm:block"
       id="sidebar"
       [class.hidden]="!isOpen()"
       [class.open]="isOpen()"
>
  <div class="h-full px-3 py-4 mt-12 sm:mt-0 overflow-y-auto flex flex-col gap-1">
    <button class="" role="menuitem" title="accueil" type="button" [routerLink]="['']" (click)="isOpen() && toggle()">
      <span class="material-symbols-outlined">home</span>
    </button>

    @if (userService.isLoggedIn()){
      <button class="" role="menuitem" title="Mes sentiers" type="button" [routerLink]="['/me']" (click)="isOpen() && toggle()">
        <span class="material-symbols-outlined">route</span>Mes sentiers
      </button>
    }

    <button class="" role="menuitem" title="CGU" type="button" [routerLink]="['cgu']" (click)="isOpen() && toggle()">
      <span class="material-symbols-outlined">balance</span> CGU / charte
    </button>
  </div>
